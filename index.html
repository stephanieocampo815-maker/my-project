<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coffee Shop Sales Dashboard</title>
  
  <!-- Chart.js for graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- PapaParse for reading CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1f3f 0%, #0e2a52 100%);
      color: #fff;
      min-height: 100vh;
      padding: 0;
    }
    
    .container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* SIDEBAR */
    .sidebar {
      width: 150px;
      background: linear-gradient(180deg, #0d2952 0%, #081f3a 100%);
      padding: 20px 10px;
      overflow-y: auto;
      border-right: 1px solid #1a3a5c;
      position: static;
      height: auto;
      box-shadow: none;
    }
    
    .sidebar-section {
      margin-bottom: 30px;
    }
    
    .sidebar-title {
      font-size: 0.85em;
      font-weight: bold;
      color: #6bb6ff;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .sidebar-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    
    .filter-btn {
      padding: 8px 12px;
      background: linear-gradient(135deg, #1a5a9e 0%, #0f3a6e 100%);
      color: #fff;
      border: 1px solid #2a7abf;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .filter-btn:hover, .filter-btn.active {
      background: linear-gradient(135deg, #2a7abf 0%, #1a5a9e 100%);
      border-color: #4a9adf;
    }
    
    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-left: 0;
      padding: 0;
    }
    
    .dashboard-header {
      background: linear-gradient(90deg, #0a1f3f 0%, #1a3f6f 100%);
      padding: 20px 30px;
      border-bottom: 2px solid #2a5a8f;
      display: flex;
      align-items: center;
      gap: 30px;
    }
    
    .header-title {
      font-size: 2.2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .header-icon {
      font-size: 2.5em;
    }
    
    /* DASHBOARD GRID */
    .dashboard-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 30px;
    }
    
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .kpi-card {
      background: linear-gradient(135deg, #1a4a7f 0%, #0f2a5f 100%);
      border: 2px solid #2a6abf;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .kpi-card h4 {
      font-size: 0.9em;
      color: #8bb3ff;
      margin-bottom: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .kpi-value {
      font-size: 1.8em;
      font-weight: bold;
      color: #fff;
    }
    
    /* CHARTS GRID */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .chart-card {
      background: linear-gradient(135deg, #1a4a7f 0%, #0f2a5f 100%);
      border: 2px solid #2a6abf;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .chart-card h3 {
      font-size: 1em;
      color: #fff;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 600;
    }
    
    canvas {
      max-height: 250px;
    }
    
    .side-section {
      background: linear-gradient(135deg, #1a4a7f 0%, #0f2a5f 100%);
      border: 2px solid #2a6abf;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    
    .side-section h3 {
      font-size: 1em;
      color: #fff;
      margin-bottom: 15px;
      font-weight: 600;
    }
    
    .bar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 0.9em;
    }
    
    .bar-label {
      flex: 0 0 120px;
      color: #9bb8ff;
    }
    
    .bar-value {
      color: #4ad96f;
      font-weight: 600;
      flex: 0 0 50px;
    }
    
    .bar {
      flex: 1;
      height: 20px;
      background: linear-gradient(90deg, #2a6abf 0%, #1a4a9f 100%);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
    }
    
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ad96f 0%, #2ab850 100%);
      border-radius: 3px;
    }
    
    /* TWO COLUMN LAYOUT FOR BOTTOM */
    .bottom-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }
    
    /* SCROLLABLE */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #2a6abf;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #3a8aef;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">📅 Year</div>
        <div class="sidebar-buttons">
          <button class="filter-btn active" data-year="2025">2025</button>
        </div>
      </div>
      
      <div class="sidebar-section">
        <div class="sidebar-title">📆 Month</div>
        <div class="sidebar-buttons" id="monthButtons"></div>
      </div>
    </div>
    
    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="dashboard-header">
        <div class="header-title">
          <span class="header-icon">☕</span>
          <span>STELLAR Coffee Shop Sales</span>
        </div>
        <div style="margin-left: auto; font-size: 0.9em; color: #aaa;">
          <span id="lastUpdated"></span>
        </div>
      </div>
      
      <div class="dashboard-content">
        <!-- KPI CARDS -->
        <div class="kpi-row">
          <div class="kpi-card">
            <h4>Transactions</h4>
            <div class="kpi-value" id="kpiTransactions">0</div>
          </div>
          <div class="kpi-card">
            <h4>Qty Sold</h4>
            <div class="kpi-value" id="kpiQty">0</div>
          </div>
          <div class="kpi-card">
            <h4>Total Revenue</h4>
            <div class="kpi-value" id="kpiRevenue">$0</div>
          </div>
          <div class="kpi-card">
            <h4>Total Profit</h4>
            <div class="kpi-value" id="kpiProfit">$0</div>
          </div>
          <div class="kpi-card">
            <h4>Profit Margin</h4>
            <div class="kpi-value" id="kpiMargin">0%</div>
          </div>
        </div>
        
        <!-- CHARTS SECTION -->
        <div class="bottom-section">
          <div>
            <!-- TOP ROW CHARTS (2x) -->
            <div class="charts-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 20px;">
              <div class="chart-card">
                <h3>Category Transactions</h3>
                <canvas id="categoryTransChart"></canvas>
              </div>
              <div class="chart-card">
                <h3>Weekday Transactions Count</h3>
                <canvas id="weekdayChart"></canvas>
              </div>
            </div>
            
            <!-- BOTTOM ROW CHARTS (2x) -->
            <div class="charts-grid" style="grid-template-columns: 1fr 1fr;">
              <div class="chart-card">
                <h3>Monthly Revenue</h3>
                <canvas id="monthlyChart"></canvas>
              </div>
              <div class="chart-card">
                <h3>Revenue % by Category</h3>
                <canvas id="revenueDistChart"></canvas>
              </div>
            </div>
          </div>
          
          <!-- RIGHT SIDE PANELS -->
          <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="side-section">
              <h3>📊 Revenue by Category</h3>
              <div id="revenueBars"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="dashboard.js"></script>
</body>
</html>
